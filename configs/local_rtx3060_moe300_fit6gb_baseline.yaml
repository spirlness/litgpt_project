# RTX 3060 (6GB) baseline run for MoE-300M-Fit6GB
out_dir: ./checkpoints_moe300_fit6gb
precision: 16-mixed
tokenizer_dir: ./data/tokenizer

strategy: auto
devices: 1
num_nodes: 1

data:
  class_path: src.litgpt_moe.fixed_text_files.FixedTextFiles
  init_args:
    train_data_path: ./data/custom_text/train
    val_data_path: ./data/custom_text/val
    num_workers: 0

train:
  global_batch_size: 8
  micro_batch_size: 1
  log_interval: 10
  max_tokens: 10000000
  lr_warmup_steps: 100
  save_interval: 1000
  gradient_checkpointing: true
  max_norm: 1.0
  max_seq_length: 256

eval:
  interval: 1000
  final_validation: false

resume: auto

checkpointing:
  upload_to_hf: true
  # hf_repo_id: set via HF_REPO_ID environment variable

optimization:
  compile: false
  compile_mode: default
  compile_dynamic: false
  compile_fullgraph: false
  flash_attention: true
  flash_attention_force: false
  disable_math_fallback: false

logger_name: csv

optimizer:
  class_path: muon.MuonWithAuxAdam
  init_args:
    muon_lr: 0.01
    muon_momentum: 0.95
    muon_weight_decay: 0.01
    adam_lr: 0.0003
    adam_betas: [0.9, 0.95]
    adam_eps: 1.0e-8
    adam_weight_decay: 0.01
